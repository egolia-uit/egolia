# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    course-preflight:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && Method(`OPTIONS`) && PathPrefix(`/course`)
      service: course-http
      middlewares:
        - cors

    course-http-admin:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/course`)
      service: course-http
      middlewares:
        - cors
        # - protect-admin

    course-http-instructor-or-admin:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/course`)
      service: course-http
      middlewares:
        - cors
        # - protect-instructor-or-admin

    course-http-public:
      entryPoints:
        - web
      rule: "
        Host(`api.egolia.localhost`) && ( \
        PathPrefix(`/course/courses-published`) || \
        PathPrefix(`/course/courses/{courseId:[a-zA-Z0-9-]+}/detail`) || \
        PathPrefix(`/course/certificates/{certificateId:[a-zA-Z0-9-]+}`) \
        ) \
        "
      service: course-http
      middlewares:
        - cors

    course-grpc:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/course.CourseService/`)
      service: course-grpc

    course-health:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/course/health`)
      service: course-health
      middlewares:
        - cors

  services:
    course-http:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8081

    course-grpc:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18081

    course-health:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:28081
