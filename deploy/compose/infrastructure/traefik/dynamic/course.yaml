# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    course-http-admin:
      entryPoints:
        - web
      rule: "
        Host(`api.egolia.localhost`) && ( \
        (PathPrefix(`/course/courses/{courseId:[a-zA-Z0-9-]+}`) && Method(`DELETE`)) \
        ) \
        "
      service: course-http
      priority: 80
      middlewares:
        - cors
        - protect-admin

    course-http-instructor-or-admin:
      entryPoints:
        - web
      rule: "
        Host(`api.egolia.localhost`) && ( \
        (PathPrefix(`/course/courses/{courseId:[a-zA-Z0-9-]+}/basic-info`) && Method(`PATCH`)) \
        ) \
        "
      service: course-http
      priority: 70
      middlewares:
        - cors
        - protect-instructor-or-admin

    course-http-public:
      entryPoints:
        - web
      rule: "
        Host(`api.egolia.localhost`) && ( \
        PathPrefix(`/course/courses-published`) || \
        PathPrefix(`/course/courses/{courseId:[a-zA-Z0-9-]+}/detail`) || \
        PathPrefix(`/course/certificates/{certificateId:[a-zA-Z0-9-]+}`) \
        ) \
        "
      service: course-http
      priority: 60
      middlewares:
        - cors

    course-http-authenticated:
      entryPoints:
        - web
      rule: "
        Host(`api.egolia.localhost`) && ( \
        PathPrefix(`/course/`) \
        ) \
        "
      service: course-http
      priority: 50
      middlewares:
        - cors

    course-grpc:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/course.CourseService/`)
      priority: 90
      service: course-grpc

    course-health:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/course/health`)
      priority: 100
      service: course-health

  services:
    course-http:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8081

    course-grpc:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18081

    course-health:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:28081
