# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    blog:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/blog`)
      service: blog
      middlewares:
        - jwt
    blog-health:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/blog/health`)
      service: blog-health

  services:
    blog:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:18083
    blog-health:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:28083
