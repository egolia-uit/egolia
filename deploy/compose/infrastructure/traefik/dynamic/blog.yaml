# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    blog-preflight:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && Method(`OPTIONS`) && PathPrefix(`/blog`)
      service: blog-http
      middlewares:
        - cors

    blog-http-authenticated:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/blog`)
      service: blog-http
      priority: 50
      middlewares:
        - cors
        - authenticated

    blog-health:
      entryPoints:
        - web
      rule: Host(`api.egolia.localhost`) && PathPrefix(`/blog/health`)
      service: blog-health
      priority: 100
      middlewares:
        - cors

  services:
    blog-http:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:8083
    blog-health:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:28083
