# yaml-language-server: $schema=https://www.schemastore.org/traefik-v3-file-provider.json
http:
  routers:
    web:
      entryPoints:
        - web
      rule: Host(`web.egolia.localhost`)
      service: web

  services:
    web:
      loadBalancer:
        servers:
          - url: http://host.docker.internal:3000
