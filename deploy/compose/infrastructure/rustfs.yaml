# vim:ft=yaml.docker-compose:
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
services:
  rustfs:
    container_name: egolia-rustfs
    image: rustfs/rustfs:1.0.0-beta.1-glibc
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-egoliauit}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-egoliauit}
      RUSTFS_CONSOLE_ENABLE: 'true'
      # RUSTFS_SERVER_DOMAINS: rustfs.egolia.localhost
      RUSTFS_IDENTITY_OPENID_ENABLE: 'true'
      RUSTFS_IDENTITY_OPENID_CONFIG_URL: http://authentik.egolia.localhost/application/o/rustfs/.well-known/openid-configuration
      RUSTFS_IDENTITY_OPENID_CLIENT_ID: rustfs
      RUSTFS_IDENTITY_OPENID_CLIENT_SECRET: egoliauit
      RUSTFS_IDENTITY_OPENID_SCOPES: openid,profile,email,entitlements
      RUSTFS_IDENTITY_OPENID_REDIRECT_URI: http://rustfs.egolia.localhost/rustfs/admin/v3/oidc/callback/authentik
      RUSTFS_IDENTITY_OPENID_ROLE_POLICY: readwrite,consoleUser
      RUSTFS_IDENTITY_OPENID_DISPLAY_NAME: authentik
    volumes:
      - rustfs:/data
    labels:
      traefik.enable: 'true'
      traefik.http.routers.rustfs-api.rule: Host(`rustfs-api.egolia.localhost`)
      traefik.http.routers.rustfs-api.entrypoints: web
      traefik.http.routers.rustfs-api.service: rustfs-api
      traefik.http.services.rustfs-api.loadbalancer.server.port: '9000'
      traefik.http.routers.rustfs-console.rule: Host(`rustfs.egolia.localhost`)
      traefik.http.routers.rustfs-console.entrypoints: web
      traefik.http.routers.rustfs-console.service: rustfs-console
      traefik.http.services.rustfs-console.loadbalancer.server.port: '9001'
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/health
      start_period: 10s
      start_interval: 1s
    restart: unless-stopped
    extra_hosts:
      - authentik.egolia.localhost:host-gateway
    depends_on:
      rustfs_volume_permission_helper:
        condition: service_completed_successfully

  rustfs_volume_permission_helper:
    image: alpine
    container_name: egolia-rustfs_volume_permission_helper
    volumes:
      - rustfs:/data
    command: > # language: sh
      sh -c "
        chown -R 10001:10001 /data
        echo 'Volume Permissions fixed'
      "
    restart: 'no'

  rustfs_bucket:
    image: rustfs/rc:v0.1.13
    container_name: egolia-rustfs_bucket
    entrypoint: > # language: sh
      /bin/sh -c '
        until (rc alias set rustfs http://rustfs:9000 ${RUSTFS_ACCESS_KEY:-egoliauit} ${RUSTFS_SECRET_KEY:-egoliauit}) do
          sleep 1;
        done
        rc mb rustfs/course;
        rc anonymous set public rustfs/course;
      '
    restart: 'no'
    depends_on:
      rustfs:
        condition: service_healthy

volumes:
  rustfs:
