# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: Egolia - Users
  labels:
    blueprint-group: egolia
    blueprints.goauthentik.io/description: |
      User list
entries:
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: authentik Bootstrap

  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: Default - RBAC - Read-only

  - model: authentik_core.group
    id: rustfs-group
    identifiers:
      name: RustFS

  - model: authentik_core.group
    id: egolia-group
    identifiers:
      name: Egolia

  - model: authentik_core.group
    id: egolia-instructor-group
    identifiers:
      name: Egolia Instructor
    attrs:
      parents:
        - !KeyOf egolia-group

  - model: authentik_core.group
    id: egolia-admin-group
    identifiers:
      name: Egolia Admin
    attrs:
      parents:
        - !KeyOf egolia-group

  - model: authentik_core.user
    identifiers:
      username: egoliauit
    attrs:
      name: EgoliaUIT
      email: egoliauit@egolia.com
      groups:
        - !Find [authentik_core.group, [name, authentik Admins]]
        - !KeyOf egolia-admin-group
        - !KeyOf rustfs-group
      password: egoliauit

  - model: authentik_core.user
    id: user-learner
    identifiers:
      pk: 110
    attrs:
      username: learner
      name: Learner
      email: learner@egolia.com
      password: egoliauit

  - model: authentik_core.user
    id: user-instructor
    identifiers:
      pk: 120
    attrs:
      username: instructor
      name: Instructor
      email: instructor@egolia.com
      password: egoliauit
      groups:
        - !KeyOf egolia-instructor-group

  - model: authentik_core.user
    id: user-admin
    identifiers:
      pk: 130
    attrs:
      username: admin
      name: Admin
      email: admin@egolia.com
      password: egoliauit
      groups:
        - !KeyOf egolia-admin-group
        - !KeyOf rustfs-group

  - model: authentik_core.token
    identifiers:
      identifier: learner-app-password
    attrs:
      description: App password for learner
      expiring: false
      key: egoliauit
      managed: null
      intent: app_password
      user: !KeyOf user-learner

  - model: authentik_core.token
    identifiers:
      identifier: instructor-app-password
    attrs:
      description: App password for instructor
      expiring: false
      key: egoliauit
      managed: null
      intent: app_password
      user: !KeyOf user-instructor

  - model: authentik_core.token
    identifiers:
      identifier: admin-app-password
    attrs:
      description: App password for admin
      expiring: false
      key: egoliauit
      managed: null
      intent: app_password
      user: !KeyOf user-admin

  - model: authentik_core.user
    id: billing-service
    identifiers:
      pk: 1002
    attrs:
      username: billing-service
      name: billing Service
      type: service_account
      path: goauthentik.io/service-accounts
      password: egoliauit
      groups:
        - !Find [authentik_core.group, [name, authentik Read-only]]
      attributes:
        goauthentik.io/user/token-expires: false

  - model: authentik_core.token
    identifiers:
      identifier: service-account-billing-service-password
    attrs:
      description: Token for billing Service
      expiring: false
      key: egoliauit
      managed: null
      intent: api
      user: !KeyOf billing-service
