# vim:ft=yaml.docker-compose:
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
services:
  traefik:
    container_name: egolia-traefik
    image: traefik:v3.6.14
    command:
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - 80:80
      # - 8080:8080 # no dashboard no need
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/:/etc/traefik/:ro
    labels:
      traefik.enable: 'true'
      traefik.http.routers.traefik.rule: Host(`traefik.egolia.localhost`)
      traefik.http.routers.traefik.entrypoints: web
      traefik.http.routers.traefik.service: api@internal
    extra_hosts:
      - host.docker.internal:host-gateway
      - authentik.egolia.localhost:host-gateway
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
