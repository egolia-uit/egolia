# vim:ft=yaml.docker-compose:
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
services:
  grafana:
    container_name: egolia-grafana
    image: grafana/grafana:12.4.3
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: http://grafana.egolia.localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources/:/etc/grafana/provisioning/datasources/:ro
      - ./grafana/provisioning/dashboards/:/etc/grafana/provisioning/dashboards/:ro
    labels:
      traefik.enable: 'true'
      traefik.http.routers.grafana.rule: Host(`grafana.egolia.localhost`)
      traefik.http.routers.grafana.entrypoints: web
      traefik.http.services.grafana.loadbalancer.server.port: '3000'
    profiles:
      - monitoring
    restart: unless-stopped

volumes:
  grafana_data:
