syntax = "proto3";

package course;

import "buf/validate/validate.proto";

service CourseService {
  // NOTE: wtf? where is it used?
  rpc GetCourseTitlesByIds(GetCourseTitlesByIdsRequest) returns (GetCourseTitlesByIdsResponse);
  rpc GetCourseMetadata(GetCourseMetadataRequest) returns (GetCourseMetadataResponse);
}

// TODO: Check again how many
enum CourseStatus {
  COURSE_STATUS_UNSPECIFIED = 0;
  COURSE_STATUS_DRAFT = 1;
  COURSE_STATUS_PUBLISHED = 2;
  COURSE_STATUS_ARCHIVED = 3;
}

message GetCourseTitlesByIdsRequest {
  repeated string ids = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        string: {uuid: true}
      }
    }
  ];
}

message GetCourseTitlesByIdsResponse {
  repeated string titles = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        string: {uuid: true}
      }
    }
  ];
}

message GetCourseMetadataRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

message Course {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  string title = 2 [(buf.validate.field).required = true];
  string instructor_id = 3 [(buf.validate.field).required = true];
  CourseStatus status = 4 [(buf.validate.field).required = true];
  int64 price = 5 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
}

message GetCourseMetadataResponse {
  Course course = 1 [(buf.validate.field).required = true];
}
