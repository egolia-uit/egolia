syntax = "proto3";

package course;

import "buf/validate/validate.proto";

service CourseService {
  rpc GetCourseTitlesByIds(GetCourseTitlesByIdsRequest) returns (GetCourseTitlesByIdsResponse);
  rpc GetCourseById(GetCourseByIdRequest) returns (GetCourseByIdResponse);
}

// TODO: Check again how many
enum CourseStatus {
  COURSE_STATUS_UNSPECIFIED = 0;
  COURSE_STATUS_DRAFT = 1;
  COURSE_STATUS_PUBLISHED = 2;
  COURSE_STATUS_ARCHIVED = 3;
}

message GetCourseTitlesByIdsRequest {
  repeated string ids = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        string: {uuid: true}
      }
    }
  ];
}

message GetCourseTitlesByIdsResponse {
  repeated string titles = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).repeated = {
      min_items: 1
      items: {
        string: {uuid: true}
      }
    }
  ];
}

message GetCourseByIdRequest {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
}

message GetCourseByIdResponse {
  string id = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.uuid = true
  ];
  string title = 2 [(buf.validate.field).required = true];
  string slug = 3 [(buf.validate.field).required = true];
  string instructor_id = 4 [(buf.validate.field).required = true];
  CourseStatus status = 5 [(buf.validate.field).required = true];
  int64 price = 6 [
    (buf.validate.field).required = true,
    (buf.validate.field).int64.gt = 0
  ];
}
