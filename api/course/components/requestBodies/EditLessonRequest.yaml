required: true
content:
  application/json:
    schema:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Encapsulation Deep Dive
        previousLessonId:
          type: string
          format: uuid
          nullable: true
          example: ed405041-986f-4750-92e6-617dd9337a78
        videoUrl:
          type: string
          format: uri
          example: https://cdn.egolia.localhost/videos/lesson-1.mp4
        duration:
          type: integer
          format: int64
          minimum: 1
          example: 300
      minProperties: 1
