allOf:
  - $ref: ./Lesson.yaml
  - type: object
    properties:
      videoKey:
        type: string
        example: lessons/46f94d4d-41b5-4df6-bf8d-270fb9a49c97/87632fe7-27e5-445e-8ddf-b73557cb990d-introduction_to_python.mp4
        writeOnly: true

      videoUrl:
        type: string
        format: uri
        example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
        readOnly: true

      duration:
        type: integer
        format: int64
        example: 300

    required:
      - videoKey
      - videoUrl
      - duration
