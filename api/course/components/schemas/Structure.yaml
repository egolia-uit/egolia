type: array
readOnly: true
description: Course structure with sections and their corresponding lessons.
  This is a read-only field that provides the organization of the course
  content.
items:
  type: object
  properties:
    sectionId:
      type: string
      format: uuid
      example: "sec-550e8400-e29b-41d4"
    lessonIds:
      type: array
      items:
        type: string
        format: uuid
      example: [ "les-11111111-1111-1111", "les-22222222-2222-2222" ]
