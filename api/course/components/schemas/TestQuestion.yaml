type: object

properties:
  id:
    type: string
    format: uuid
    example: af2fb7f2-cf11-40d4-8628-b28f7d40f933
    readOnly: true

  question:
    type: string
    minLength: 1
    maxLength: 2000
    example: Which principle of OOP enables exposing only essential behavior?

  answers:
    type: array
    minItems: 1
    items:
      $ref: ./TestAnswer.yaml

required:
  - id
  - question
  - answers
