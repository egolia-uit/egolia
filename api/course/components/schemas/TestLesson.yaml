allOf:
  - $ref: ./Lesson.yaml
  - type: object
    properties:
      lessonType:
        type: string
        enum:
          - test
        example: test

      type:
        type: string
        enum:
          - multipleChoice
          - singleChoice
        example: singleChoice

      questions:
        type: array
        items:
          type: object
          $ref: ./TestQuestion.yaml

    required:
      - lessonType
      - type
      - questions
