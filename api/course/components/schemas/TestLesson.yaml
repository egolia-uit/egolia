allOf:
  - $ref: ./Lesson.yaml
  - type: object
    required:
      - type
      - questions
    properties:
      type:
        type: string
        enum:
          - multipleChoice
          - singleChoice
        example: singleChoice

      questions:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              format: uuid
              example: af2fb7f2-cf11-40d4-8628-b28f7d40f933
              readOnly: true

            question:
              type: string
              minLength: 1
              maxLength: 2000
              example: Which principle of OOP enables exposing only essential behavior?

            answers:
              type: array
              minItems: 1
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    example: 4c413364-151d-44e4-a357-c0c5cf7c5f4a
                    readOnly: true

                  content:
                    type: string
                    minLength: 1
                    maxLength: 1000
                    example: Encapsulation hides implementation details behind a stable API.

                  isCorrect:
                    type: boolean
                    example: true

                required:
                  - id
                  - content
                  - isCorrect

          required:
            - id
            - question
            - answers
