type: object

properties:
  course:
    $ref: ./CourseDetail.yaml
  overview:
    type: string
    example: Learn practical Go backend concepts in this beginner-friendly course.
  introduction:
      type: object
      x-go-type-name: CourseLandingPageIntroduction
      properties:
        videoUrl:
          type: string
          format: uri
          example: https://cdn.egolia.localhost/videos/course-intro.mp4
      required:
        - videoUrl
required:
  - course
  - overview
  - introduction
