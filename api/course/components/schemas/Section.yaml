type: object

properties:
  id:
    type: string
    format: uuid
    example: 0de4f8f2-3440-4e29-9b88-9cfbbf4476fc
    readOnly: true

  title:
    type: string
    minLength: 1
    maxLength: 255
    example: OOP Fundamentals

  # order string lexorank
  order:
    type: string
    example: a
    readOnly: true

  courseId:
    $ref: ./Course.yaml#/properties/id

required:
  - id
  - courseId
  - title
