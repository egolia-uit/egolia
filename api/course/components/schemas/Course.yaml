type: object

properties:
  id:
    type: string
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
    readOnly: true

  title:
    type: string
    example: Introduction to Programming

  instructorId:
    $ref: ../../../common/components/schemas/User.yaml#/properties/id
    example: '100'
    readOnly: true

  status:
    $ref: ./CourseStatus.yaml

  price:
    type: integer
    format: int64
    example: 1000000

required:
  - id
  - title
  - instructorId
  - status
  - price
