type: object

properties:
  id:
    type: string
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
    readOnly: true

  title:
    type: string
    example: Introduction to Programming

  price:
    type: integer
    format: int64
    example: 1000000

  hidden:
    type: boolean
    default: true
    example: true
    readOnly: true

  instructorId:
    $ref: ../../../common/components/schemas/User.yaml#/properties/id
    example: "100"
    readOnly: true

  status:
    $ref: ./CourseStatus.yaml
    readOnly: true

  overview:
    type: string
    example: Learn practical Go backend concepts in this beginner-friendly course.

  introduction:
    type: object
    x-go-type-name: CourseLandingPageIntroduction
    properties:
      videoUrl:
        type: string
        format: uri
        example: https://cdn.egolia.localhost/videos/course-intro.mp4
    required:
      - videoUrl

  # import structure từ file Structure.yaml để trả về cấu trúc khóa học
  structure:
    $ref: ./Structure.yaml
    readOnly: true
required:
  - title
  - price
