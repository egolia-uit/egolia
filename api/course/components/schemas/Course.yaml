type: object

properties:
  id:
    type: string
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
    readOnly: true

  originalCourseId:
    type: string
    format: uuid
    example: 123e4567-e89b-12d3-a456-426614174000
    readOnly: true

  title:
    type: string
    example: Introduction to Programming

  price:
    type: integer
    format: int64
    example: 1000000

  hidden:
    type: boolean
    default: true
    example: true
    readOnly: true

  instructorId:
    $ref: ../../../common/components/schemas/User.yaml#/properties/id
    example: '100'

  status:
    $ref: ./CourseStatus.yaml

  overview:
    type: string
    example: Learn practical Go backend concepts in this beginner-friendly course.

  introductionVideoUrl:
    type: string
    format: uri
    example: https://cdn.egolia.localhost/videos/course-intro.mp4
    readOnly: true

  introductionVideoKey:
    type: string
    example: videos/course-intro.mp4
    writeOnly: true

required:
  - title
  - price
