type: object

properties:
  id:
    type: string
    format: uuid
    example: f56b56cb-4dc9-4f84-b9d0-f20f73de2ffd
    readOnly: true

  courseId:
    $ref: ./Course.yaml#/properties/id

  userId:
    $ref: ../../../common/components/schemas/User.yaml#/properties/id

  issuedAt:
    type: string
    format: date-time
    example: 2026-05-01T07:30:00Z

required:
  - id
  - courseId
  - userId
  - issuedAt
