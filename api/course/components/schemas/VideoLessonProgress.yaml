allOf:
  - $ref: ./LessonProgress.yaml
  - type: object
    properties:
      watchedSeconds:
        type: number
        format: float
        minimum: 0
        example: 245.5

      lastWatchedAt:
        type: string
        format: date-time
        example: '2024-06-01T12:34:56Z'
    required:
      - watchedSeconds
      - lastWatchedAt
