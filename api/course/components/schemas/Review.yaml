type: object

properties:
  id:
    type: string
    format: uuid
    example: 7113037a-f260-4f75-a376-613c5f75d9ad
    readOnly: true

  courseId:
    $ref: ./Course.yaml#/properties/id

  userId:
    type: string
    example: user_100

  rating:
    type: integer
    format: int32
    minimum: 1
    maximum: 5
    example: 5

  comment:
    type: string
    maxLength: 2000
    example: Excellent course with practical exercises.

required:
  - id
  - courseId
  - userId
  - rating
  - comment
