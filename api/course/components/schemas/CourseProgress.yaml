type: object
properties:
  courseId:
    $ref: ./Course.yaml#/properties/id
    example: 123e4567-e89b-12d3-a456-426614174000
  userId:
    type: string
    format: uuid
    example: 2e15aba5-cf11-430a-b92a-e8dd65620911
  totalLessons:
    type: integer
    format: int32
    minimum: 0
    example: 20
  completedLessons:
    type: integer
    format: int32
    minimum: 0
    example: 14
  progressPercent:
    type: number
    format: float
    minimum: 0
    maximum: 100
    example: 70
  isCompleted:
    type: boolean
    example: false
required:
  - courseId
  - userId
  - totalLessons
  - completedLessons
  - progressPercent
  - isCompleted
