type: object
properties:
  courseId:
    $ref: ./Course.yaml#/properties/id
  triggeredAt:
    type: string
    format: date-time
    example: 2026-03-24T10:30:00Z
  notifiedLearners:
    type: integer
    format: int32
    minimum: 0
    example: 128
required:
  - courseId
  - triggeredAt
  - notifiedLearners
