description: Full course content with section and lesson references
content:
  application/json:
    schema:
      allOf:
        - $ref: ../../../common/components/schemas/DataEnvelope.yaml
        - type: object
          properties:
            data:
              type: object
              properties:
                course:
                  $ref: ../schemas/Course.yaml
                sections:
                  type: array
                  items:
                    type: object
                    properties:
                      section:
                        $ref: ../schemas/Section.yaml
                      lessonIds:
                        type: array
                        items:
                          type: string
                          format: uuid
                    required:
                      - section
                      - lessonIds
              required:
                - course
                - sections
          required:
            - data
