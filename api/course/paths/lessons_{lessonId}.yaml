get:
  security:
    - Oauth2: []
  tags:
    - Lesson
  summary: Get lesson detail
  operationId: getLessonDetail
  parameters:
    - $ref: ../components/parameters/lessonIdPath.yaml
  responses:
    200:
      description: Lesson detail
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: ../components/schemas/LessonDetail.yaml
            required:
              - data
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml

delete:
  security:
    - Oauth2: []
  tags:
    - Lesson
  summary: Delete lesson
  operationId: deleteLesson
  parameters:
    - $ref: ../components/parameters/lessonIdPath.yaml
  responses:
    204:
      description: Lesson successfully deleted
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
