post:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Lesson
  summary: Create lesson
  operationId: createLesson
  description: |
    - authenticated:
      - instructor
      - admin
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
    - $ref: ../components/parameters/sectionIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          discriminator:
            propertyName: lessonType
            # Thêm mapping ở đây
            mapping:
              video: '../components/schemas/VideoLesson.yaml'
              test: '../components/schemas/TestLesson.yaml'
          oneOf:
            - $ref: ../components/schemas/VideoLesson.yaml
            - $ref: ../components/schemas/TestLesson.yaml
  responses:
    201:
      description: Lesson created
      headers:
        Content-Location:
          schema:
            type: string
            format: uri
            example: http://api.egolia.localhost/course/lessons/123e4567-e89b-12d3-a456-426614174000
          required: true
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
