delete:
  security:
    - Oauth2: []
  tags:
    - Section
  summary: Delete section
  operationId: deleteSection
  parameters:
    - $ref: ../components/parameters/sectionIdPath.yaml
  responses:
    204:
      description: Section successfully deleted
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml

patch:
  security:
    - Oauth2: []
  tags:
    - Section
  summary: Update section
  operationId: updateSectionTitle
  parameters:
    - $ref: ../components/parameters/sectionIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - title
          properties:
            title:
              type: string
              minLength: 1
              maxLength: 255
              example: OOP Fundamentals
  responses:
    200:
      description: Section title successfully updated
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
