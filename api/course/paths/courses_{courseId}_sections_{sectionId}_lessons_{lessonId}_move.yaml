post:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Lesson
  summary: Move lesson
  operationId: moveLesson
  description: |
    - authenticated:
      - instructor
      - admin

  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
    - $ref: ../components/parameters/sectionIdPath.yaml
    - $ref: ../components/parameters/lessonIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            targetSectionId:
              type: string
              format: uuid
              description: The ID of the section to move the lesson into. Use the current sectionId if only reordering.
              example: 0de4f8f2-3440-4e29-9b88-9cfbbf4476fc

            order:
              type: integer
              format: int
              description: The new 0-based position of the lesson within the target section.
              example: 2
          required:
            - targetSectionId
            - order

  responses:
    201:
      description: Lesson moved successfully
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
