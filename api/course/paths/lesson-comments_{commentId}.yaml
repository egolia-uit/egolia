delete:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Lesson
  summary: Delete lesson comment
  operationId: deleteLessonComment
  description: |
    - authenticated:
      - instructor
      - admin
  parameters:
    - $ref: ../components/parameters/commentIdPath.yaml
  responses:
    204:
      description: Lesson comment deleted
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
