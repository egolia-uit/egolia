post:
  security:
    - Oauth2: []
  tags:
    - Lesson
  summary: Get upload video lesson URL
  operationId: getUploadVideoLessonUrl
  parameters:
    - $ref: ../components/parameters/lessonIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            videoFilename:
              type: string
              example: introduction_to_python.mp4
          required:
            - videoFilename
  responses:
    201:
      description: Upload URL generated
      content:
        application/json:
          schema:
            type: object
            properties:
              uploadUrl:
                type: string
                format: uri
                example: https://storage.egolia.localhost/upload/signed-url-token
              videoKey:
                type: string
                example: lessons/46f94d4d-41b5-4df6-bf8d-270fb9a49c97/87632fe7-27e5-445e-8ddf-b73557cb990d-introduction_to_python.mp4
              expiresAt:
                type: string
                format: date-time
                example: 2026-03-22T10:30:00Z
            required:
              - uploadUrl
              - videoKey
              - expiresAt
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
