post:
  security:
    - Oauth2: []
  tags:
    - Course
  summary: Enroll in course
  operationId: enrollInCourse
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
  responses:
    201:
      description: Course enrollment created
      headers:
        Content-Location:
          schema:
            type: string
            format: uri
            example: http://api.egolia.localhost/course/courses/123e4567-e89b-12d3-a456-426614174000/enroll
          required: true
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
