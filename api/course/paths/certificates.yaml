post:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Certificate
  summary: Create certificate
  operationId: createCertificate
  description: |
    - authenticated:

  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - courseId
            - userId
          properties:
            courseId:
              $ref: ../components/schemas/Course.yaml#/properties/id
            userId:
              $ref: ../../common/components/schemas/User.yaml#/properties/id
  responses:
    201:
      description: Certificate created
      headers:
        Content-Location:
          schema:
            type: string
            format: uri
            example: http://api.egolia.localhost/course/certificates/f56b56cb-4dc9-4f84-b9d0-f20f73de2ffd
          required: true
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
