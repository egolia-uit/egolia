post:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Section
  summary: Move section
  operationId: moveSection
  description: |
    - authenticated:
      - instructor
      - admin
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
    - $ref: ../components/parameters/sectionIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            courseId:
              $ref: ../components/schemas/Course.yaml#/properties/id
            order:
              type: integer
              description: New order of the section within the course (0-based index)
              example: 1

          required:
            - courseId
            - order
  responses:
    200:
      description: Section moved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  structure:
                    type: array
                    description:
                      Resulting course structure after moving the section, including all
                      sections and their lessons
                    items:
                      type: object
                      properties:
                        sectionId:
                          type: string
                          format: uuid
                          example: 0de4f8f2-3440-4e29-9b88-9cfbbf4476fc
                        lessonIds:
                          type: array
                          items:
                            type: string
                            format: uuid
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
