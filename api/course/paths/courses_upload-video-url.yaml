post:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openidnx
        - entitlements
  tags:
    - Course
    - Lesson
  summary: Get upload video URL
  operationId: getUploadVideoUrl
  description: |
    - authenticated:
      - instructor
      - admin
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            videoFilename:
              type: string
              example: introduction_to_python.mp4
          required:
            - videoFilename
  responses:
    201:
      description: Upload URL generated
      content:
        application/json:
          schema:
            type: object
            properties:
              uploadUrl:
                type: string
                format: uri
                example: https://storage.egolia.localhost/upload/signed-url-token
              videoKey:
                type: string
                example: video-lessons/introduction_to_python.mp4-019612ab-1234-7abc-8def-270fb9a49c97
              expiresAt:
                type: string
                format: date-time
                example: 2026-03-22T10:30:00Z
            required:
              - uploadUrl
              - videoKey
              - expiresAt
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
