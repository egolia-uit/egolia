post:
  security:
    - Oauth2: []
  tags:
    - Section
  summary: Move section
  operationId: moveSection
  parameters:
    - $ref: ../components/parameters/sectionIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:

            courseId:
              $ref: ../components/schemas/Course.yaml#/properties/id

            sectionId:
              type: string
              format: uuid
              description: ID of the section to move (must match the sectionId path parameter)
              example: 0de4f8f2-3440-4e29-9b88-9cfbbf4476fc

            preOrder:
              type: string
              example: ab
              description: order of the section you want to insert to

          required:
            - courseId
            - sectionId
            - preOrder
  responses:
    200:
      description: Section moved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  structure:
                    type: array
                    description: Resulting course structure after moving the section, including all
                      sections and their lessons
                    items:
                      type: object
                      properties:
                        sectionId:
                          type: string
                          format: uuid
                          example: 0de4f8f2-3440-4e29-9b88-9cfbbf4476fc
                        lessonIds:
                          type: array
                          items:
                            type: string
                            format: uuid
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
