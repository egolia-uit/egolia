get:
  security:
    - Oauth2: []
  tags:
    - Lesson
  summary: Get lesson progress
  operationId: getLessonProgress
  parameters:
    - $ref: ../components/parameters/lessonIdPath.yaml
  responses:
    200:
      description: Lesson progress
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: ../components/schemas/LessonProgress.yaml
            required:
              - data
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml

put:
  security:
    - Oauth2: []
  tags:
    - Lesson
  summary: Save lesson progress
  operationId: saveLessonProgress
  parameters:
    - $ref: ../components/parameters/lessonIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            watchedSeconds:
              type: number
              format: float
              minimum: 0
              example: 245.5
            isCompleted:
              type: boolean
              example: false
  responses:
    204:
      description: Lesson progress saved
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml