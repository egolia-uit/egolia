get:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Course
  summary: Get course students
  operationId: getCourseStudents
  description: |
    - authenticated:
      - instructor
      - admin
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
    - $ref: ../../common/components/parameters/pageQuery.yaml
    - $ref: ../../common/components/parameters/limitQuery.yaml
    - $ref: ../../common/components/parameters/orderQuery.yaml
  responses:
    200:
      description: Course students
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/CourseStudent.yaml
              pagination:
                $ref: ../../common/components/schemas/Pagination.yaml
            required:
              - data
              - pagination
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
