post:
  security:
    - Oauth2: []
  tags:
    - Course
  summary: Trigger learning reminder
  operationId: triggerLearningReminder
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
          properties:
            dryRun:
              type: boolean
              example: false
  responses:
    200:
      description: Learning reminder triggered
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: ../components/schemas/LearningReminder.yaml
            required:
              - data
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml