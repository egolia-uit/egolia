get:
  security:
    - Oauth2: []
  tags:
    - Course
  summary: Get course
  operationId: getCourse
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
  responses:
    200:
      $ref: ../components/responses/GetCourseResponse.yaml
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml

delete:
  security:
    - Oauth2: []
  tags:
    - Course
  summary: Delete course
  operationId: deleteCourse
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
  responses:
    204:
      $ref: ../components/responses/DeleteCourseResponse.yaml
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
