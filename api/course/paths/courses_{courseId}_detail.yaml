get:
  security:
    - Oauth2: []
  tags:
    - Course
  summary: Get full course detail
  operationId: getCourseDetail
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
  responses:
    200:
      description: Full course content with section and lesson references
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  course:
                    $ref: ../components/schemas/Course.yaml
                  sections:
                    type: array
                    items:
                      type: object
                      properties:
                        section:
                          $ref: ../components/schemas/Section.yaml
                        lessonIds:
                          type: array
                          items:
                            type: string
                            format: uuid
                      required:
                        - section
                        - lessonIds
                required:
                  - course
                  - sections
            required:
              - data
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml