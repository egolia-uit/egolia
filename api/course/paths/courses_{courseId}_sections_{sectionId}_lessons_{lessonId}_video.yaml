patch:
  security:
    - Oauth2:
        - openid
        - entitlements
    - OIDC:
        - openid
        - entitlements
  tags:
    - Lesson
  summary: Edit video lesson
  operationId: editVideoLesson
  description: |
    - authenticated:
      - instructor
      - admin
  parameters:
    - $ref: ../components/parameters/courseIdPath.yaml
    - $ref: ../components/parameters/sectionIdPath.yaml
    - $ref: ../components/parameters/lessonIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            videoKey:
              type: string
              example: lessons/46f94d4d-41b5-4df6-bf8d-270fb9a49c97/87632fe7-27e5-445e-8ddf-b73557cb990d-introduction_to_python.mp4
              writeOnly: true

            title:
              type: string
              example: Introduction to Python

            duration:
              type: integer
              format: int64
              example: 300
  responses:
    204:
      description: Video lesson successfully updated
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
