# vim: ft=yaml.openapi
type: oauth2
description: OAuth2 Security Scheme
flows:
  authorizationCode:
    authorizationUrl: http://authentik.egolia.localhost/application/o/authorize/
    tokenUrl: http://authentik.egolia.localhost/application/o/token/
    scopes:
      openid: OpenID Connect scope
      email: Email scope
      profile: Profile scope
      entitlements: Entitlements scope
    x-defaultClientId: api-web
    x-scalar-client-id: api-web
    x-usePkce: SHA-256
    x-scalar-credentials-location: header

  password:
    tokenUrl: http://authentik.egolia.localhost/application/o/token/
    scopes:
      openid: OpenID Connect scope
      email: Email scope
      profile: Profile scope
      entitlements: Entitlements scope
    x-default-scopes:
      - openid
      - profile
      - email
      - entitlements
    x-defaultClientId: api-web
    x-scalar-client-id: api-web
    x-scalar-credentials-location: body
