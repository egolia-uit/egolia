get:
  security:
    - Oauth2: []
  tags:
    - Billing
  summary: Get transactions
  operationId: getTransactions
  parameters:
    - $ref: ../../common/components/parameters/pageQuery.yaml
    - $ref: ../../common/components/parameters/limitQuery.yaml
    - $ref: ../../common/components/parameters/orderQuery.yaml
    - name: courseId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    - name: learnerId
      in: query
      description: If requested by non admin, then it will be that user
      required: false
      schema:
        $ref: ../../common/components/schemas/User.yaml#/properties/id
  responses:
    200:
      description: Learner billing history
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/Transaction.yaml
              pagination:
                $ref: ../../common/components/schemas/Pagination.yaml
            required:
              - data
              - pagination
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
