post:
  security:
    - Oauth2: []
  tags:
    - Billing
  summary: Checkout course
  operationId: checkoutCourse
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Transaction.yaml
  responses:
    201:
      description: Checkout transaction created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Transaction.yaml
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
