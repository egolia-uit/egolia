post:
  security:
    - Oauth2: []
  tags:
    - Checkout
  summary: Checkout course
  operationId: checkoutCourse
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            courseId:
              type: string
              format: uuid
              example: 0f4f19b1-1602-4c12-ac1a-9ad5baf1e4dc
            amount:
              type: integer
              format: int64
              minimum: 0
              example: 499000
            currency:
              type: string
              minLength: 3
              maxLength: 3
              example: VND
          required:
            - courseId
            - amount
            - currency
  responses:
    201:
      description: Checkout transaction created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Transaction.yaml#/Transaction
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    403:
      $ref: ../../common/components/responses/ForbiddenError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
