type: object

properties:
  courseId:
    type: string
    format: uuid
    example: 0f4f19b1-1602-4c12-ac1a-9ad5baf1e4dc

  amount:
    type: integer
    format: int64
    minimum: 0
    example: 499000

  currency:
    type: string
    minLength: 3
    maxLength: 3
    example: VND

  # paymentMethod:
  #   type: string
  #   example: bank_transfer

required:
  - courseId
  - amount
  - currency
  - paymentMethod
