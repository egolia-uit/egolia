type: object

properties:
  from:
    type: string
    format: date-time
    example: 2026-03-22T10:30:00Z

  to:
    type: string
    format: date-time
    example: 2026-03-22T10:30:00Z

  totalRevenue:
    type: integer
    format: int64
    minimum: 0
    example: 152000000

  completedTransactions:
    type: integer
    minimum: 0
    example: 421

  failedTransactions:
    type: integer
    minimum: 0
    example: 9

required:
  - from
  - to
  - totalRevenue
  - completedTransactions
  - failedTransactions
