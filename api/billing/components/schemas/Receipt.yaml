type: object

properties:
  transaction:
    $ref: ./Transaction.yaml

  receiptNumber:
    type: string
    format: uuid
    example: RCPT-20260325-0001

  issuedAt:
    type: string
    format: date-time
    example: '2026-03-25T08:35:00Z'

  billedTo:
    type: object
    properties:
      userId:
        $ref: ../../../common/components/schemas/User.yaml#/properties/id
      email:
        $ref: ../../../common/components/schemas/User.yaml#/properties/email
    required:
      - userId

required:
  - transaction
  - receiptNumber
  - issuedAt
  - billedTo
