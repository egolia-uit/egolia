get:
  security:
    - Oauth2: []
  tags:
    - Post
  summary: Search posts
  operationId: searchPosts
  parameters:
    - name: q
      in: query
      description: Full-text keyword for post search
      schema:
        type: string
      example: hoc tap hieu qua
    - name: tag
      in: query
      description: Filter posts by tag
      schema:
        type: string
      example: learning
    - $ref: ../../common/components/parameters/pageQuery.yaml
    - $ref: ../../common/components/parameters/limitQuery.yaml
    - $ref: ../../common/components/parameters/orderQuery.yaml
  responses:
    200:
      description: Matched blog posts
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/Post.yaml#/Post
              pagination:
                $ref: ../../common/components/schemas/Pagination.yaml
            required:
              - data
              - pagination
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml

post:
  security:
    - Oauth2: []
  tags:
    - Post
  summary: Create post
  operationId: createPost
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            title:
              type: string
              example: Cach toi toi uu hanh trinh hoc tap
            content:
              type: string
              minLength: 1
              example: Day la noi dung bai viet chia se kinh nghiem hoc tap tren Egolia.
            tags:
              type: array
              items:
                type: string
              example:
                - learning
                - productivity
          required:
            - title
            - content
            - tags
  responses:
    201:
      description: Post created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Post.yaml#/Post
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
