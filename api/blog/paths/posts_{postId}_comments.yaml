get:
  security:
    - Oauth2: []
  tags:
    - Comment
  summary: Get post comments
  operationId: getPostComments
  parameters:
    - $ref: ../components/parameters/postIdPath.yaml
  responses:
    200:
      description: Top-level comments for the post
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/Comment.yaml
            required:
              - data
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml

post:
  security:
    - Oauth2: []
  tags:
    - Comment
  summary: Comment on post
  operationId: commentOnPost
  parameters:
    - $ref: ../components/parameters/postIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            content:
              type: string
              minLength: 1
              example: Cam on ban da chia se.
          required:
            - content
  responses:
    201:
      description: Comment created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Comment.yaml
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
