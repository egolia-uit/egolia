post:
  security:
    - Oauth2: []
  tags:
    - Comment
  summary: Reply comment
  operationId: replyComment
  parameters:
    - $ref: ../../common/components/parameters/commentIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            content:
              type: string
              minLength: 1
              example: Cam on ban da chia se.
          required:
            - content
  responses:
    201:
      description: Reply created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Comment.yaml
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
