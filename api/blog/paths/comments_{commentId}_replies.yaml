post:
  security:
    - Oauth2: []
  tags:
    - Comment
  summary: Reply comment
  operationId: replyComment
  parameters:
    - $ref: ../components/parameters/commentIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Comment.yaml#/CreateCommentRequest
  responses:
    201:
      description: Reply created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Comment.yaml#/Reply
    400:
      $ref: ../../common/components/responses/BadRequestError.yaml
    401:
      $ref: ../../common/components/responses/UnauthorizedError.yaml
    404:
      $ref: ../../common/components/responses/NotFoundError.yaml
    500:
      $ref: ../../common/components/responses/InternalServerError.yaml
