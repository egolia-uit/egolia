type: object

properties:
  id:
    type: string
    format: uuid
    example: 834897ce-45e7-43a5-92b2-4ec1f0dc3cd1
    readOnly: true

  postId:
    type: string
    format: uuid
    example: 74af02ce-4e69-4ca1-a721-c0e19c9937b8
    readOnly: true

  authorId:
    $ref: ../../../common/components/schemas/User.yaml#/properties/id
    readOnly: true

  content:
    type: string
    minLength: 1
    example: Bai viet nay rat huu ich.

  parentCommentId:
    type: string
    format: uuid
    nullable: true
    example: null
    readOnly: true

  createdAt:
    type: string
    format: date-time
    example: '2026-03-25T09:00:00Z'
    readOnly: true

required:
  - id
  - postId
  - authorId
  - content
  - parentCommentId
  - createdAt
