,677.4087,222.9609,681.4087,218.9609" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="550.5576" x2="683.4087" y1="218.9609" y2="218.9609"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9.0454" x="557.5576" y="213.895">4</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.8057" x="570.603" y="213.895">Forward request</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg5"><polygon fill="#181818" points="980.5269,244.0938,990.5269,248.0938,980.5269,252.0938,984.5269,248.0938" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="699.4087" x2="986.5269" y1="248.0938" y2="248.0938"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9.0454" x="706.4087" y="243.0278">5</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="261.0728" x="719.4541" y="243.0278">GetCompletedCourseMilestones(userID)</text></g><g class="message" data-entity-1="part5" data-entity-2="part6" id="msg6"><polygon fill="#181818" points="1245.1401,273.2266,1255.1401,277.2266,1245.1401,281.2266,1249.1401,277.2266" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="1002.5269" x2="1251.1401" y1="277.2266" y2="277.2266"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9.0454" x="1009.5269" y="272.1606">6</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222.5679" x="1022.5723" y="272.1606">Get completed courses with dates</text></g><g class="message" data-entity-1="part6" data-entity-2="part6" id="msg7"><line style="stroke:#181818;stroke-width:1;" x1="1267.1401" x2="1309.1401" y1="412.2891" y2="412.2891"/><line style="st