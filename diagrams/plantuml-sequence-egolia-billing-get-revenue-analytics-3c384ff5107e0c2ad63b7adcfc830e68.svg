.9609" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9.0454" x="575.2368" y="186.895">3</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.3887" x="588.2822" y="186.895">Validate JWT, check admin role</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg4"><polygon fill="#181818" points="795.6709,230.0938,805.6709,234.0938,795.6709,238.0938,799.6709,234.0938" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="568.2368" x2="801.6709" y1="234.0938" y2="234.0938"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9.0454" x="575.2368" y="229.0278">4</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106.8057" x="588.2822" y="229.0278">Forward request</text></g><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg5"><polygon fill="#181818" points="1120.9932,259.2266,1130.9932,263.2266,1120.9932,267.2266,1124.9932,263.2266" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="817.6709" x2="1126.9932" y1="263.2266" y2="263.2266"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="9.0454" x="824.6709" y="258.1606">5</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.2769" x="837.7163" y="258.1606">GetPlatformRevenueAnalytics(period, year)</text></g><g class="message" data-entity-1="part5" data-entity-2="part6" id="msg6"><polygon fill="#181818" points="1360.0635,288.3594,1370.0635,292.3594,1360.0635,296.3594,1364.0635,292.3594" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="1142.9932" x2="1366.0635" y1="292.3594" y2="292.3594"